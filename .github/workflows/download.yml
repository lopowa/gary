name: M3U Downloader (Standard V2 Mode)

on:
  schedule:
    - cron: '0 * * * *' # 每小時自動執行一次
  workflow_dispatch: # 容許你在 GitHub 網頁上手動點擊 Run 執行

permissions:
  contents: write

jobs:
  download_job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Check Runner IP
      run: |
        echo "=== 當前 GitHub Actions 伺服器出口 IP ==="
        curl -s https://ifconfig.me
        echo -e "\n======================================="

    - name: Download M3U File
      run: |
        # 1. 設定帶有最新 Token 嘅目標網址
        URL="https://garyshare.sharewithyou.dpdns.org/garyshare.m3u?token=worldcup2026"
        
        # 2. 設定常規播放器 User-Agent 特徵
        UA="VLC/3.0.18 LibVLC/3.0.18"
        
        echo "正在發送標準 HTTP 請求至目標伺服器..."
        
        # 3. 執行常規下載
        curl -s -L -A "$UA" --max-time 30 "$URL" > result_file.m3u

    - name: Verify Content and Save
      run: |
        # 檢查回傳內容是否包含 M3U 標頭
        if grep -q "#EXTM3U" result_file.m3u; then
          echo "🎯 成功：成功獲取正確的 M3U 檔案結構！"
          mv result_file.m3u latest_file.m3u
        else
          echo "⚠️ 警告：回傳內容不符合 M3U 格式。"
          echo "=== 回傳內容前 10 行節錄 ==="
          head -n 10 result_file.m3u
          echo "============================"
          # 依然保留檔案更名，方便你稍後在 Release 下載下來查看完整的 HTML 報錯頁面
          mv result_file.m3u latest_file.m3u
        fi

    - name: Push to GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: "latest"
        name: "M3U 自動更新測試"
        body: "基於標準環境獲取的最新測試檔案。"
        artifacts: "latest_file.m3u"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
