name: IPTV Player Bypass M3U Downloader

on:
  schedule:
    # 定時排程：每小時的第 0 分鐘自動執行一次 (UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch: # 容許你在 GitHub 後台手動「撳掣」即時測試

permissions:
  contents: write # 開啟寫入權限發布到 Release

jobs:
  bypass_and_download:
    runs-on: ubuntu-latest # 使用 GitHub 提供嘅免費美國 Ubuntu 伺服器

    steps:
    # Step 1: 複製倉庫檔案
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: 安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: 安裝連線套件
    - name: Install curl_cffi
      run: |
        pip install curl_cffi

    # Step 4: 運行 Python 腳本，使用實測成功的 AptvPlayer UA 闖關
    - name: Run Anti-Cloudflare Python Script
      run: |
        cat << 'EOF' > download.py
        import sys
        from curl_cffi import requests

        url = "https://garyshare.sharewithyou.dpdns.org/garyshare.m3u?token=worldcup2026"
        target_ua = "AptvPlayer/1.5.4"
        
        print(f"正在使用 100% 成功率嘅播放器指紋連線: {target_ua}")
        
        headers = {
            "User-Agent": target_ua,
            "Accept": "*/*",
            "Connection": "keep-alive"
        }
        
        try:
            response = requests.get(url, headers=headers, timeout=20)
            content = response.text

            # 檢查是否成功攞到 M3U 內容
            if "#EXTM3U" in content:
                with open("latest_file.m3u", "w", encoding="utf-8") as f:
                    f.write(content)
                print("🎯 🎯 完美成功！已順利用 APTV 專用 UA 取得 M3U 檔案！")
            else:
                print("❌ 失敗：返過嚟嘅內容依然唔係 M3U。")
                print("【調試資訊】網頁前 200 個字元內容如下：")
                print(content[:200])
                sys.exit(1)
                
        except Exception as e:
            print(f"❌ 連線期間發生錯誤: {e}")
            sys.exit(1)
        EOF
        python download.py

    # Step 5: 將下載好嘅最新 m3u 檔案推上 GitHub Releases 放上網
    - name: Upload and Host File on GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: "latest"
        name: "最新自動下載檔案 (已成功破盾)"
        body: "此檔案由 GitHub Actions 偽裝成真實 APTV 播放器 (AptvPlayer/1.5.4)，成功繞過封鎖並每小時自動更新。"
        artifacts: "latest_file.m3u"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
