name: Cloudflare Bypass M3U Downloader v4 (IPTV Player Mode)

on:
  schedule:
    # 定時排程：每小時的第 0 分鐘自動執行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 容許你隨時手動撳掣測試

permissions:
  contents: write # 開啟寫入權限發布到 Release

jobs:
  player_mode_download:
    runs-on: ubuntu-latest # 使用 GitHub 免費伺服器

    steps:
    # Step 1: 複製倉庫檔案
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: 安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: 安裝基本 requests 套件
    - name: Install requests
      run: pip install requests

    # Step 4: 運行 Python 腳本，輪流用幾款真正播放器嘅身分去「拍門」下載
    - name: Download using IPTV Player Identity
      run: |
        cat << 'EOF' > download.py
        import sys
        import requests

        url = "https://garyshare.sharewithyou.dpdns.org/garyshare.m3u"
        
        # 模擬真正 IPTV 播放器及相關引擎嘅 User-Agent 名單
        player_uas = [
            "VLC/3.0.18 LibVLC/3.0.18",                       # 經典 VLC 播放器
            "Lavf/58.76.100",                                 # 絕大部分 Android IPTV App (如 TiviMate/Perfect Player) 內置嘅 FFmpeg 引擎特徵
            "TiviMate/4.7.0 (Linux;Android 11)",              # TiviMate 專用特徵
            "Mozilla/5.0 (Windows NT 10.0; Win64; x64) PotPlayer/230208" # 電腦版 PotPlayer 特徵
        ]
        
        success = False
        content = ""
        
        print("【情報確認】避開瀏覽器特徵，啟動 IPTV 播放器白名單偽裝技術...")
        
        for ua in player_uas:
            print(f"嘗試使用播放器指紋: {ua}")
            try:
                # 使用最純淨嘅 requests 連線，配合播放器 UA
                response = requests.get(url, headers={"User-Agent": ua}, timeout=20)
                res_text = response.text
                
                # 檢查返過嚟嘅內容係咪真係 M3U 清單
                if "#EXTM3U" in res_text:
                    print(f"🎯 🎯 成功！用呢個播放器指紋衝過去咗: {ua}")
                    content = res_text
                    success = True
                    break
                elif "Just a moment..." in res_text or "ie6 oldie" in res_text:
                    print(f"   ↳ 失敗：依然被 Cloudflare 擋截（可能佢連機房 IP 都鎖埋）。")
                else:
                    print(f"   ↳ 成功連線，但返過嚟嘅內容好似唔係 M3U (字數: {len(res_text)})。")
            except Exception as e:
                print(f"   ↳ 連線出錯: {e}")
        
        if success:
            with open("latest_file.m3u", "w", encoding="utf-8") as f:
                f.write(content)
            print("🎯 檔案下載並成功儲存！")
        else:
            print("❌ 殘念！所有播放器指紋都入唔到。")
            sys.exit(1)
        EOF
        python download.py

    # Step 5: 下載成功後，照舊推上 GitHub Releases 放上網
    - name: Upload and Host File on GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: "latest"
        name: "最新自動下載檔案 (播放器偽裝版)"
        body: "此檔案由 GitHub Actions 偽裝成真正 IPTV 播放器 (VLC/Lavf) 繞過瀏覽器封鎖並自動更新。"
        artifacts: "latest_file.m3u"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
