name: Cloudflare Bypass M3U Downloader v2

on:
  schedule:
    # 定時排程：每小時的第 0 分鐘自動執行一次 (UTC 時間)
    - cron: '0 * * * *'
  workflow_dispatch: # 容許你在 GitHub 後台手動「撳掣」即時測試

permissions:
  contents: write # 開啟寫入權限發布到 Release

jobs:
  bypass_and_download:
    runs-on: ubuntu-latest # 使用 GitHub 提供嘅免費美國 Ubuntu 伺服器

    steps:
    # Step 1: 複製倉庫檔案
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: 安裝 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: 安裝專門破 Cloudflare 防禦的 curl_cffi 套件
    - name: Install curl_cffi
      run: |
        pip install curl_cffi

    # Step 4: 運行 Python 腳本，利用 TLS 瀏覽器指紋偽裝技術直接下載
    - name: Run Anti-Cloudflare Python Script
      run: |
        cat << 'EOF' > download.py
        import sys
        from curl_cffi import requests

        # 這裡已經更新為帶有 token 的最新網址
        url = "https://garyshare.sharewithyou.dpdns.org/garyshare.m3u?token=worldcup2026"
        
        print("正在啟動 TLS Fingerprint (Chrome) 偽裝技術衝過 Cloudflare (使用新網址)...")
        
        try:
            # impersonate="chrome" 會命令底層完美複製真實 Chrome 瀏覽器的 TLS 握手同 HTTP/2 特徵
            response = requests.get(url, impersonate="chrome", timeout=30)
            content = response.text

            # IPTV 的 M3U 檔案標準開頭必定含有 #EXTM3U 關鍵字
            if "#EXTM3U" in content:
                with open("latest_file.m3u", "w", encoding="utf-8") as f:
                    f.write(content)
                print("🎯 🎯 恭喜！成功用新網址騙過 Cloudflare 盾，安全下載 M3U 檔案！")
                
            elif "Just a moment..." in content or "challenge-running" in content:
                print("❌ 殘念！依然被 Cloudflare 辨認出是自動化請求（中盾）。")
                sys.exit(1)
                
            else:
                print("❌ 雖然冇俾 Cloudflare 塞住，但返過嚟嘅內容好似唔係 M3U 格式。")
                print("【調試資訊】網頁前 200 個字元內容如下：")
                print(content[:200])
                sys.exit(1)
                
        except Exception as e:
            print(f"❌ 執行出錯: {e}")
            sys.exit(1)
        EOF
        python download.py

    # Step 5: 將下載好嘅最新 m3u 檔案推上 GitHub Releases 放上網
    - name: Upload and Host File on GitHub Release
      uses: ncipollo/release-action@v1
      with:
        tag: "latest"
        name: "最新自動下載檔案 (已成功破盾)"
        body: "此檔案由 GitHub Actions 使用 curl_cffi 偽裝真實瀏覽器 TLS 指紋自動更新。"
        artifacts: "latest_file.m3u"
        allowUpdates: true
        removeArtifacts: true
        replacesArtifacts: true
